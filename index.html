// ================= LOGIC =================
let current = 0;
let userAnswers = new Array(questions.length).fill(null);

function startQuiz(){
    document.getElementById("home").style.display = "none";
    document.getElementById("quizContainer").style.display = "block";
    showQuestion();
}

function showQuestion(){
    let q = questions[current];
    let html = `<h3>${current + 1}. ${q.q}</h3><div class="options">`;

    q.options.forEach((opt, i) => {
        const selectedClass = userAnswers[current] === i ? "selected" : "";
        html += `
            <label class="${selectedClass}" onclick="selectAnswer(${i})">
                <input type="radio" name="answer" ${userAnswers[current] === i ? "checked" : ""} style="margin-right:8px;">
                ${opt}
            </label>
        `;
    });

    html += `</div>`;
    document.getElementById("quiz").innerHTML = html;

    document.getElementById("nav-buttons").innerHTML = `
        <button onclick="prev()" ${current === 0 ? "disabled" : ""}>Prev</button>
        <button onclick="next()">${current === questions.length - 1 ? "Finish" : "Next"}</button>
    `;

    document.getElementById("result").innerText = `Soal ${current + 1} / ${questions.length}`;
}

function selectAnswer(i){
    userAnswers[current] = i;
    showQuestion();
}

function next(){
    if(current < questions.length - 1){
        current++;
        showQuestion();
    } else {
        finish();
    }
}

function prev(){
    if(current > 0){
        current--;
        showQuestion();
    }
}

function finish(){
    let score = 0;
    let reviewHtml = "<h3>Hasil Quiz</h3>";

    questions.forEach((q, idx) => {
        const correct = userAnswers[idx] === q.answer;
        if(correct) score++;

        reviewHtml += `
            <div style="margin-bottom:20px; padding:12px; border:1px solid #ddd; border-radius:8px;">
                <b>${idx + 1}. ${q.q}</b><br>
                Jawaban kamu: ${userAnswers[idx] !== null ? q.options[userAnswers[idx]] : "<i>Belum dijawab</i>"}<br>
                Jawaban benar: <b>${q.options[q.answer]}</b><br>
                <small>${q.explain}</small>
            </div>
        `;
    });

    document.getElementById("result").innerText = `Score: ${score} / ${questions.length}`;
    document.getElementById("quiz").innerHTML = reviewHtml;
    document.getElementById("nav-buttons").innerHTML = "";
}
</script>
